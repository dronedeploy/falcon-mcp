name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deny all permissions at the workflow level; each job grants only what it needs.
permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@39eb6c9dde236bbc368681611e63120a6eb4afac # v5

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Generate module documentation
        run: uv run python scripts/generate_module_docs.py

      - name: Prepare changelog
        run: |
          {
            printf '%s\n' '---'
            printf '%s\n' 'title: Changelog'
            printf '%s\n' 'description: Release history for the Falcon MCP Server.'
            printf '%s\n' '---'
            printf '\n'
            cat CHANGELOG.md
          } > docs-site/src/content/docs/changelog.md

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        run: cd docs-site && npm ci

      - name: Build docs site
        run: cd docs-site && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs-site/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
